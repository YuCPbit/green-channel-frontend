name: 前端持续集成

on:
  push:
    branches: [ main, codex/integrate-a-tasks ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Vue 自动构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 构建前端
        run: npm run build
